<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Tech Master Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-box button { width: 100%; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .dashboard { display: none; }
        .header { background: white; padding: 20px; display: flex; justify-content: space-between; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        .btn-danger { background: #dc3545; color: white; border: none; border-radius: 5px; }
        .btn-primary { background: #007bff; color: white; border: none; border-radius: 5px; }
        .stat-card { background: white; padding: 20px; margin: 10px; border-radius: 10px; display: inline-block; width: 200px; text-align: center; }
        .company-item, .merch-item, .store-item { background: white; padding: 15px; margin: 10px; border-radius: 10px; display: flex; justify-content: space-between; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 400px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; }
        .tab { padding: 10px 20px; cursor: pointer; background: #f0f0f0; border: none; }
        .tab.active { background: #dc3545; color: white; }
        .content-panel { display: none; padding: 20px; }
        .content-panel.active { display: block; }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>D-Tech Master Admin</h1>
            <p>Enter Master Password</p>
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">LOGIN</button>
            <p style="margin-top:20px;">Enter: MASTER2024</p>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="header">
            <h2>Master Admin Dashboard</h2>
            <div>
                <button class="btn-primary" onclick="showTab(0)">Dashboard</button>
                <button class="btn-primary" onclick="showTab(1)">Companies</button>
                <button class="btn-primary" onclick="showTab(2)">Merchandisers</button>
                <button class="btn-primary" onclick="showTab(3)">Stores</button>
                <button class="btn-primary" onclick="showTab(4)">Audit Logs</button>
                <button class="btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="tab0" class="content-panel active">
            <div id="stats"></div>
            <div style="background:white; margin:20px; padding:20px; border-radius:10px;">
                <h3>Quick Actions</h3>
                <button class="btn-primary" onclick="showAddCompanyModal()">Add Company</button>
                <button class="btn-primary" onclick="showAddMerchandiserModal()">Add Merchandiser</button>
                <button class="btn-primary" onclick="showAddStoreModal()">Add Store</button>
            </div>
        </div>

        <div id="tab1" class="content-panel"><div id="companiesList"></div></div>
        <div id="tab2" class="content-panel"><div id="merchandisersList"></div></div>
        <div id="tab3" class="content-panel"><div id="storesList"></div></div>
        <div id="tab4" class="content-panel"><div id="auditLogsList"></div></div>
    </div>

    <!-- Modals -->
    <div id="companyModal" class="modal"><div class="modal-content"><h3>Add Company</h3><input type="text" id="companyName" placeholder="Company Name"><input type="text" id="companyCode" placeholder="Company Code"><button onclick="addCompany()">Add</button><button onclick="closeModal('companyModal')">Cancel</button></div></div>
    <div id="merchModal" class="modal"><div class="modal-content"><h3>Add Merchandiser</h3><select id="merchCompanyId"></select><input type="text" id="merchName" placeholder="Name"><input type="text" id="merchCode" placeholder="Employee Code"><input type="text" id="merchPassword" placeholder="Password" value="MERCH2024"><button onclick="addMerchandiser()">Add</button><button onclick="closeModal('merchModal')">Cancel</button></div></div>
    <div id="storeModal" class="modal"><div class="modal-content"><h3>Add Store</h3><select id="storeCompanyId"></select><select id="storeAssignedTo"></select><input type="text" id="storeName" placeholder="Store Name"><input type="text" id="storeLat" placeholder="Latitude"><input type="text" id="storeLng" placeholder="Longitude"><button onclick="addStore()">Add</button><button onclick="closeModal('storeModal')">Cancel</button></div></div>

    <script>
        let companies = [], merchandisers = [], stores = [], auditLogs = [];

        function login() {
            if (document.getElementById('password').value === 'MASTER2024') {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else { alert('Wrong password'); }
        }
        function logout() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }
        function loadData() {
            companies = JSON.parse(localStorage.getItem('companies') || '[]');
            merchandisers = JSON.parse(localStorage.getItem('merchandisers') || '[]');
            stores = JSON.parse(localStorage.getItem('stores') || '[]');
            auditLogs = JSON.parse(localStorage.getItem('auditLogs') || '[]');
            refreshAll();
        }
        function saveData() {
            localStorage.setItem('companies', JSON.stringify(companies));
            localStorage.setItem('merchandisers', JSON.stringify(merchandisers));
            localStorage.setItem('stores', JSON.stringify(stores));
            localStorage.setItem('auditLogs', JSON.stringify(auditLogs));
        }
        function refreshAll() {
            document.getElementById('stats').innerHTML = '<div class="stat-card"><h3>' + companies.length + '</h3><p>Companies</p></div><div class="stat-card"><h3>' + merchandisers.length + '</h3><p>Merchandisers</p></div><div class="stat-card"><h3>' + stores.length + '</h3><p>Stores</p></div>';
            refreshCompaniesList();
            refreshMerchandisersList();
            refreshStoresList();
            refreshAuditLogs();
        }
        function refreshCompaniesList() {
            let html = '';
            companies.forEach(c => { html += '<div class="company-item"><div><strong>' + c.name + '</strong><br>Code: ' + c.code + '</div><button onclick="deleteCompany(\'' + c.id + '\')">Delete</button></div>'; });
            document.getElementById('companiesList').innerHTML = html || '<p>No companies</p>';
        }
        function refreshMerchandisersList() {
            let html = '';
            merchandisers.forEach(m => { 
                const company = companies.find(c => c.id === m.companyId);
                html += '<div class="merch-item"><div><strong>' + m.name + '</strong><br>' + (company ? company.name : 'Unknown') + ' | Code: ' + m.employeeCode + '<br>Password: ' + m.password + '</div><div><button onclick="exportStores(\'' + m.id + '\', \'' + m.name + '\')">Export</button><button onclick="deleteMerchandiser(\'' + m.id + '\')">Delete</button></div></div>';
            });
            document.getElementById('merchandisersList').innerHTML = html || '<p>No merchandisers</p>';
        }
        function refreshStoresList() {
            let html = '';
            stores.forEach(s => {
                const company = companies.find(c => c.id === s.companyId);
                const merch = merchandisers.find(m => m.id === s.assignedTo);
                html += '<div class="store-item"><div><strong>' + s.name + '</strong><br>' + (company ? company.name : 'Unknown') + ' | Assigned: ' + (merch ? merch.name : 'Unassigned') + '<br>' + s.latitude + ', ' + s.longitude + '</div><button onclick="deleteStore(\'' + s.id + '\')">Delete</button></div>';
            });
            document.getElementById('storesList').innerHTML = html || '<p>No stores</p>';
        }
        function refreshAuditLogs() {
            let html = '';
            auditLogs.slice(0, 20).forEach(log => { html += '<div class="company-item"><div><strong>' + log.action + '</strong><br>' + log.details + '</div></div>'; });
            document.getElementById('auditLogsList').innerHTML = html || '<p>No logs</p>';
        }
        function exportStores(merchId, merchName) {
            const storesForMerch = stores.filter(s => s.assignedTo === merchId);
            if (storesForMerch.length === 0) { alert('No stores assigned'); return; }
            const exportData = { merchandiser_id: merchId, merchandiser_name: merchName, stores: storesForMerch.map(s => ({ id: s.id, name: s.name, latitude: s.latitude, longitude: s.longitude, radiusMeters: s.radiusMeters })) };
            navigator.clipboard.writeText(JSON.stringify(exportData));
            alert('JSON copied! Send to merchandiser via WhatsApp.');
        }
        function showAddCompanyModal() { document.getElementById('companyModal').style.display = 'flex'; }
        function addCompany() {
            const name = document.getElementById('companyName').value, code = document.getElementById('companyCode').value;
            if (name && code) {
                companies.push({ id: Date.now().toString(), name: name, code: code.toUpperCase() });
                saveData(); refreshAll(); closeModal('companyModal');
            }
        }
        function deleteCompany(id) { companies = companies.filter(c => c.id !== id); merchandisers = merchandisers.filter(m => m.companyId !== id); stores = stores.filter(s => s.companyId !== id); saveData(); refreshAll(); }
        function showAddMerchandiserModal() {
            const select = document.getElementById('merchCompanyId');
            select.innerHTML = '';
            companies.forEach(c => { select.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
            document.getElementById('merchModal').style.display = 'flex';
        }
        function addMerchandiser() {
            const companyId = document.getElementById('merchCompanyId').value, name = document.getElementById('merchName').value, code = document.getElementById('merchCode').value, password = document.getElementById('merchPassword').value;
            if (name && code && companyId) {
                merchandisers.push({ id: Date.now().toString(), name: name, companyId: companyId, employeeCode: code.toUpperCase(), password: password });
                saveData(); refreshAll(); closeModal('merchModal');
            }
        }
        function deleteMerchandiser(id) { merchandisers = merchandisers.filter(m => m.id !== id); stores = stores.filter(s => s.assignedTo !== id); saveData(); refreshAll(); }
        function showAddStoreModal() {
            const companySelect = document.getElementById('storeCompanyId');
            companySelect.innerHTML = '';
            companies.forEach(c => { companySelect.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
            refreshStoreAssignedTo();
            document.getElementById('storeModal').style.display = 'flex';
        }
        function refreshStoreAssignedTo() {
            const companyId = document.getElementById('storeCompanyId').value;
            const assignedSelect = document.getElementById('storeAssignedTo');
            assignedSelect.innerHTML = '<option value="">Unassigned</option>';
            merchandisers.filter(m => m.companyId === companyId).forEach(m => { assignedSelect.innerHTML += '<option value="' + m.id + '">' + m.name + '</option>'; });
        }
        function addStore() {
            const companyId = document.getElementById('storeCompanyId').value, assignedTo = document.getElementById('storeAssignedTo').value || null, name = document.getElementById('storeName').value, lat = parseFloat(document.getElementById('storeLat').value), lng = parseFloat(document.getElementById('storeLng').value);
            if (name && !isNaN(lat) && !isNaN(lng) && companyId) {
                stores.push({ id: Date.now().toString(), name: name, latitude: lat, longitude: lng, radiusMeters: 20, companyId: companyId, assignedTo: assignedTo });
                saveData(); refreshAll(); closeModal('storeModal');
            }
        }
        function deleteStore(id) { stores = stores.filter(s => s.id !== id); saveData(); refreshAll(); }
        function showTab(index) {
            const panels = document.querySelectorAll('.content-panel');
            for (let i = 0; i < panels.length; i++) { panels[i].classList.remove('active'); }
            document.getElementById('tab' + index).classList.add('active');
        }
        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
        document.getElementById('storeCompanyId')?.addEventListener('change', refreshStoreAssignedTo);
    </script>
</body>
</html>
