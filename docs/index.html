<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Tech Master Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-box button { width: 100%; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .dashboard { display: none; }
        .header { background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .stats { display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; min-width: 150px; }
        .stat-card h3 { font-size: 32px; }
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        .company-item, .merch-item, .store-item { background: white; padding: 15px; margin: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 500px; max-width: 90%; max-height: 80%; overflow: auto; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .nav-tabs { display: flex; background: white; padding: 0 20px; gap: 10px; flex-wrap: wrap; }
        .tab { padding: 15px 20px; cursor: pointer; border: none; background: none; }
        .tab.active { border-bottom: 3px solid #dc3545; color: #dc3545; }
        .content-panel { display: none; padding: 20px; }
        .content-panel.active { display: block; }
        .sync-status { padding: 5px 10px; border-radius: 20px; font-size: 12px; display: inline-block; margin-left: 10px; }
        .sync-success { background: #d4edda; color: #155724; }
        .sync-error { background: #f8d7da; color: #721c24; }
        .sync-syncing { background: #d1ecf1; color: #0c5460; }
        .sync-warning { background: #fff3cd; color: #856404; }
        .qr-code { text-align: center; padding: 20px; }
        .json-preview { background: #f5f5f5; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; word-break: break-all; margin: 10px 0; max-height: 300px; overflow: auto; }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>D-Tech Master Admin</h1>
            <p>Complete Control Dashboard</p>
            <input type="password" id="password" placeholder="Master Password">
            <button onclick="login()">LOGIN</button>
            <p style="margin-top: 20px;">Enter: MASTER2024</p>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="header">
            <h2>Master Admin Dashboard</h2>
            <div>
                <span id="syncStatus" class="sync-status sync-warning">⏳ Initializing...</span>
                <select id="companyFilter" onchange="filterByCompany()">
                    <option value="">All Companies</option>
                </select>
                <button class="btn btn-info" onclick="syncToCloud()">⬆️ Upload to Cloud</button>
                <button class="btn btn-success" onclick="syncFromCloud()">⬇️ Download from Cloud</button>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="tab active" onclick="showTab(0)">Dashboard</button>
            <button class="tab" onclick="showTab(1)">Companies</button>
            <button class="tab" onclick="showTab(2)">Merchandisers</button>
            <button class="tab" onclick="showTab(3)">Stores</button>
            <button class="tab" onclick="showTab(4)">Audit Logs</button>
        </div>

        <div id="tab0" class="content-panel active">
            <div class="stats" id="stats"></div>
            <div style="background: white; margin: 20px; padding: 20px; border-radius: 10px;">
                <h3>Quick Actions</h3>
                <button class="btn btn-primary" onclick="showAddCompanyModal()">Add Company</button>
                <button class="btn btn-primary" onclick="showAddMerchandiserModal()">Add Merchandiser</button>
                <button class="btn btn-primary" onclick="showAddStoreModal()">Add Store</button>
                <button class="btn btn-info" onclick="syncToCloud()">⬆️ Upload to Cloud</button>
                <button class="btn btn-success" onclick="syncFromCloud()">⬇️ Download from Cloud</button>
            </div>
        </div>

        <div id="tab1" class="content-panel"><div id="companiesList"></div></div>
        <div id="tab2" class="content-panel"><div id="merchandisersList"></div></div>
        <div id="tab3" class="content-panel"><div id="storesList"></div></div>
        <div id="tab4" class="content-panel"><div id="auditLogsList"></div></div>
    </div>

    <!-- Modals -->
    <div id="companyModal" class="modal"><div class="modal-content"><h3>Add Company</h3><input type="text" id="companyName" placeholder="Company Name"><input type="text" id="companyCode" placeholder="Company Code"><button class="btn btn-success" onclick="addCompany()">Add</button><button class="btn btn-danger" onclick="closeModal('companyModal')">Cancel</button></div></div>
    <div id="merchModal" class="modal"><div class="modal-content"><h3>Add Merchandiser</h3><select id="merchCompanyId"></select><input type="text" id="merchName" placeholder="Full Name"><input type="text" id="merchEmail" placeholder="Email"><input type="text" id="merchPhone" placeholder="Phone"><input type="text" id="merchCode" placeholder="Employee Code"><input type="text" id="merchPassword" placeholder="Password" value="MERCH2024"><button class="btn btn-success" onclick="addMerchandiser()">Add</button><button class="btn btn-danger" onclick="closeModal('merchModal')">Cancel</button></div></div>
    <div id="storeModal" class="modal"><div class="modal-content"><h3>Add Store</h3><select id="storeCompanyId"></select><select id="storeAssignedTo"></select><input type="text" id="storeName" placeholder="Store Name"><input type="text" id="storeLat" placeholder="Latitude"><input type="text" id="storeLng" placeholder="Longitude"><input type="text" id="storeRadius" placeholder="Radius (meters)" value="20"><button class="btn btn-success" onclick="addStore()">Add</button><button class="btn btn-danger" onclick="closeModal('storeModal')">Cancel</button></div></div>
    <div id="qrModal" class="modal"><div class="modal-content"><h3>Export Stores</h3><div id="qrCode" class="qr-code"></div><button class="btn btn-primary" onclick="copyQRData()">Copy JSON</button><button class="btn btn-danger" onclick="closeModal('qrModal')">Close</button></div></div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://rrarpqheozekqzhlwhcw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyYXJwcWhlb3pla3F6bGh3aGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTU1MjIsImV4cCI6MjA5Njc5MTUyMn0.PdsrB2el9J2qyrYzUoBfpWruRKF9YXcI7koON0Gdzkk';
        
        let supabase;
        let companies = [], merchandisers = [], stores = [], auditLogs = [], showPasswords = false, selectedCompanyFilter = '';
        
        async function initSupabase() {
            supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            document.getElementById('syncStatus').innerHTML = '✅ Cloud Connected';
            document.getElementById('syncStatus').className = 'sync-status sync-success';
            await syncFromCloud();
        }
        
        async function syncToCloud() {
            document.getElementById('syncStatus').innerHTML = '⬆️ Uploading...';
            document.getElementById('syncStatus').className = 'sync-status sync-syncing';
            
            try {
                for (const company of companies) {
                    await supabase.from('companies').upsert(company);
                }
                for (const merch of merchandisers) {
                    await supabase.from('merchandisers').upsert(merch);
                }
                for (const store of stores) {
                    await supabase.from('stores').upsert(store);
                }
                document.getElementById('syncStatus').innerHTML = '✅ Uploaded to Cloud';
                document.getElementById('syncStatus').className = 'sync-status sync-success';
                addAuditLog('Cloud Sync', 'Data uploaded to cloud');
                setTimeout(() => {
                    document.getElementById('syncStatus').innerHTML = '✅ Cloud Connected';
                }, 3000);
            } catch (e) {
                document.getElementById('syncStatus').innerHTML = '❌ Upload Failed';
                document.getElementById('syncStatus').className = 'sync-status sync-error';
                alert('Upload failed: ' + e.message);
            }
        }
        
        async function syncFromCloud() {
            document.getElementById('syncStatus').innerHTML = '⬇️ Downloading...';
            document.getElementById('syncStatus').className = 'sync-status sync-syncing';
            
            try {
                const { data: companiesData } = await supabase.from('companies').select('*');
                const { data: merchandisersData } = await supabase.from('merchandisers').select('*');
                const { data: storesData } = await supabase.from('stores').select('*');
                
                if (companiesData && companiesData.length > 0) companies = companiesData;
                if (merchandisersData && merchandisersData.length > 0) merchandisers = merchandisersData;
                if (storesData && storesData.length > 0) stores = storesData;
                
                saveData();
                refreshAll();
                document.getElementById('syncStatus').innerHTML = '✅ Downloaded from Cloud';
                document.getElementById('syncStatus').className = 'sync-status sync-success';
                addAuditLog('Cloud Sync', 'Data downloaded from cloud');
                setTimeout(() => {
                    document.getElementById('syncStatus').innerHTML = '✅ Cloud Connected';
                }, 3000);
            } catch (e) {
                document.getElementById('syncStatus').innerHTML = '❌ Download Failed';
                document.getElementById('syncStatus').className = 'sync-status sync-error';
            }
        }
        
        function login() {
            if (document.getElementById('password').value === 'MASTER2024') {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
                initSupabase();
                addAuditLog('Login', 'Master Admin logged in');
            } else { alert('Wrong password'); }
        }
        
        function logout() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            addAuditLog('Logout', 'Master Admin logged out');
        }
        
        function loadData() {
            companies = JSON.parse(localStorage.getItem('companies') || '[]');
            merchandisers = JSON.parse(localStorage.getItem('merchandisers') || '[]');
            stores = JSON.parse(localStorage.getItem('stores') || '[]');
            auditLogs = JSON.parse(localStorage.getItem('auditLogs') || '[]');
            refreshAll();
        }
        
        function saveData() {
            localStorage.setItem('companies', JSON.stringify(companies));
            localStorage.setItem('merchandisers', JSON.stringify(merchandisers));
            localStorage.setItem('stores', JSON.stringify(stores));
            localStorage.setItem('auditLogs', JSON.stringify(auditLogs));
        }
        
        function addAuditLog(action, details) {
            auditLogs.unshift({ id: Date.now(), action: action, user: 'Master Admin', details: details, timestamp: new Date().toISOString() });
            if (auditLogs.length > 100) auditLogs.pop();
            saveData();
            refreshAuditLogs();
        }
        
        function refreshAll() {
            refreshStats();
            refreshCompanyFilter();
            refreshCompaniesList();
            refreshMerchandisersList();
            refreshStoresList();
            refreshAuditLogs();
        }
        
        function refreshStats() {
            document.getElementById('stats').innerHTML = '<div class="stat-card"><h3>' + companies.length + '</h3><p>Companies</p></div><div class="stat-card"><h3>' + merchandisers.length + '</h3><p>Merchandisers</p></div><div class="stat-card"><h3>' + stores.length + '</h3><p>Stores</p></div>';
        }
        
        function refreshCompanyFilter() {
            let html = '<option value="">All Companies</option>';
            companies.forEach(c => { html += '<option value="' + c.id + '">' + c.name + '</option>'; });
            document.getElementById('companyFilter').innerHTML = html;
        }
        
        function filterByCompany() {
            selectedCompanyFilter = document.getElementById('companyFilter').value;
            refreshMerchandisersList();
            refreshStoresList();
        }
        
        function getFilteredMerchandisers() {
            return selectedCompanyFilter ? merchandisers.filter(m => m.companyId === selectedCompanyFilter) : merchandisers;
        }
        
        function getFilteredStores() {
            let filtered = stores;
            if (selectedCompanyFilter) filtered = filtered.filter(s => s.companyId === selectedCompanyFilter);
            return filtered;
        }
        
        function refreshCompaniesList() {
            let html = '';
            companies.forEach(c => {
                html += '<div class="company-item"><div><strong>' + c.name + '</strong><br><small>Code: ' + c.code + '</small></div><button class="btn btn-danger" onclick="deleteCompany(\'' + c.id + '\')">Delete</button></div>';
            });
            document.getElementById('companiesList').innerHTML = html || '<p>No companies</p>';
        }
        
        function refreshMerchandisersList() {
            let html = '';
            getFilteredMerchandisers().forEach(m => {
                const company = companies.find(c => c.id === m.companyId);
                const companyName = company ? company.name : 'Unknown';
                html += '<div class="merch-item"><div><strong>' + m.name + '</strong><br><small>' + companyName + ' | Code: ' + m.employeeCode + '</small><br><small>Password: ' + m.password + '</small></div><div><button class="btn btn-warning" onclick="showQR(\'' + m.id + '\', \'' + m.name + '\')">Export</button><button class="btn btn-danger" onclick="deleteMerchandiser(\'' + m.id + '\')">Delete</button></div></div>';
            });
            document.getElementById('merchandisersList').innerHTML = html || '<p>No merchandisers</p>';
        }
        
        function refreshStoresList() {
            let html = '';
            getFilteredStores().forEach(s => {
                const company = companies.find(c => c.id === s.companyId);
                const companyName = company ? company.name : 'Unknown';
                const merch = merchandisers.find(m => m.id === s.assignedTo);
                const assignedName = merch ? merch.name : 'Unassigned';
                html += '<div class="store-item"><div><strong>' + s.name + '</strong><br><small>' + companyName + ' | Assigned: ' + assignedName + '</small><br><small>' + s.latitude + ', ' + s.longitude + ' | ' + s.radiusMeters + 'm</small></div><div><button class="btn btn-danger" onclick="deleteStore(\'' + s.id + '\')">Delete</button></div></div>';
            });
            document.getElementById('storesList').innerHTML = html || '<p>No stores</p>';
        }
        
        function refreshAuditLogs() {
            let html = '';
            auditLogs.slice(0, 50).forEach(log => {
                const date = new Date(log.timestamp);
                html += '<div class="company-item"><div><strong>' + log.action + '</strong><br><small>' + log.details + ' - ' + date.toLocaleString() + '</small></div></div>';
            });
            document.getElementById('auditLogsList').innerHTML = html || '<p>No logs</p>';
        }
        
        function showQR(merchId, merchName) {
            const storesForMerch = stores.filter(s => s.assignedTo === merchId);
            if (storesForMerch.length === 0) { alert('No stores assigned'); return; }
            const exportData = {
                merchandiser_id: merchId,
                merchandiser_name: merchName,
                stores: storesForMerch.map(s => ({ id: s.id, name: s.name, latitude: s.latitude, longitude: s.longitude, radiusMeters: s.radiusMeters }))
            };
            const jsonString = JSON.stringify(exportData, null, 2);
            document.getElementById('qrCode').innerHTML = '<p><strong>' + merchName + '</strong></p><p>' + storesForMerch.length + ' stores</p><div class="json-preview"><pre>' + jsonString + '</pre></div><p style="font-size:12px;">Copy this JSON and send to merchandiser</p>';
            window.currentJson = jsonString;
            document.getElementById('qrModal').style.display = 'flex';
        }
        
        function copyQRData() {
            navigator.clipboard.writeText(window.currentJson);
            alert('JSON copied! Send to merchandiser via WhatsApp.');
        }
        
        function showAddCompanyModal() { document.getElementById('companyModal').style.display = 'flex'; }
        function addCompany() {
            const name = document.getElementById('companyName').value, code = document.getElementById('companyCode').value;
            if (name && code) {
                companies.push({ id: Date.now().toString(), name: name, code: code.toUpperCase(), created_at: new Date().toISOString() });
                saveData(); refreshAll(); closeModal('companyModal');
                addAuditLog('Add Company', 'Added company: ' + name);
            }
        }
        function deleteCompany(id) {
            if (confirm('Delete this company?')) {
                const company = companies.find(c => c.id === id);
                companies = companies.filter(c => c.id !== id);
                merchandisers = merchandisers.filter(m => m.companyId !== id);
                stores = stores.filter(s => s.companyId !== id);
                saveData(); refreshAll();
                addAuditLog('Delete Company', 'Deleted company: ' + company.name);
            }
        }
        
        function showAddMerchandiserModal() {
            const select = document.getElementById('merchCompanyId');
            select.innerHTML = '';
            companies.forEach(c => { select.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
            document.getElementById('merchModal').style.display = 'flex';
        }
        function addMerchandiser() {
            const companyId = document.getElementById('merchCompanyId').value, name = document.getElementById('merchName').value, email = document.getElementById('merchEmail').value, phone = document.getElementById('merchPhone').value, code = document.getElementById('merchCode').value, password = document.getElementById('merchPassword').value;
            if (name && code && companyId) {
                merchandisers.push({ id: Date.now().toString(), name: name, email: email, phone: phone, companyId: companyId, employeeCode: code.toUpperCase(), password: password, created_at: new Date().toISOString() });
                saveData(); refreshAll(); closeModal('merchModal');
                addAuditLog('Add Merchandiser', 'Added merchandiser: ' + name);
            }
        }
        function deleteMerchandiser(id) {
            if (confirm('Delete this merchandiser?')) {
                const merch = merchandisers.find(m => m.id === id);
                merchandisers = merchandisers.filter(m => m.id !== id);
                stores = stores.filter(s => s.assignedTo !== id);
                saveData(); refreshAll();
                addAuditLog('Delete Merchandiser', 'Deleted merchandiser: ' + merch.name);
            }
        }
        
        function showAddStoreModal() {
            const companySelect = document.getElementById('storeCompanyId');
            companySelect.innerHTML = '';
            companies.forEach(c => { companySelect.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
            refreshStoreAssignedTo();
            document.getElementById('storeModal').style.display = 'flex';
        }
        function refreshStoreAssignedTo() {
            const companyId = document.getElementById('storeCompanyId').value;
            const assignedSelect = document.getElementById('storeAssignedTo');
            assignedSelect.innerHTML = '<option value="">Unassigned</option>';
            merchandisers.filter(m => m.companyId === companyId).forEach(m => { assignedSelect.innerHTML += '<option value="' + m.id + '">' + m.name + '</option>'; });
        }
        function addStore() {
            const companyId = document.getElementById('storeCompanyId').value, assignedTo = document.getElementById('storeAssignedTo').value || null, name = document.getElementById('storeName').value, lat = parseFloat(document.getElementById('storeLat').value), lng = parseFloat(document.getElementById('storeLng').value), radius = parseInt(document.getElementById('storeRadius').value);
            if (name && !isNaN(lat) && !isNaN(lng) && companyId) {
                stores.push({ id: Date.now().toString(), name: name, latitude: lat, longitude: lng, radiusMeters: radius, companyId: companyId, assignedTo: assignedTo, created_at: new Date().toISOString() });
                saveData(); refreshAll(); closeModal('storeModal');
                addAuditLog('Add Store', 'Added store: ' + name);
            }
        }
        function deleteStore(id) {
            if (confirm('Delete this store?')) {
                const store = stores.find(s => s.id === id);
                stores = stores.filter(s => s.id !== id);
                saveData(); refreshAll();
                addAuditLog('Delete Store', 'Deleted store: ' + store.name);
            }
        }
        
        function showTab(index) {
            const tabs = document.querySelectorAll('.tab');
            const panels = document.querySelectorAll('.content-panel');
            for (let i = 0; i < tabs.length; i++) {
                if (i === index) { tabs[i].classList.add('active'); panels[i].classList.add('active'); }
                else { tabs[i].classList.remove('active'); panels[i].classList.remove('active'); }
            }
        }
        
        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
        document.getElementById('storeCompanyId')?.addEventListener('change', refreshStoreAssignedTo);
    </script>
</body>
</html>
