<!DOCTYPE html>
<html>
<head>
    <title>D-Tech Master Admin</title>
    <style>
        body { font-family: Arial; background: #667eea; margin: 0; padding: 20px; }
        .login-box, .dashboard { background: white; max-width: 500px; margin: 50px auto; padding: 30px; border-radius: 10px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-success { background: #28a745; color: white; }
        .company, .merch, .store { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; }
        .dashboard { display: none; max-width: 800px; }
        .tabs button { background: #e0e0e0; }
        .tabs button.active { background: #dc3545; color: white; }
        .tab-content { display: none; margin-top: 20px; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginBox" class="login-box">
        <h1>D-Tech Master Admin</h1>
        <p>Enter: MASTER2024</p>
        <input type="password" id="password" placeholder="Master Password">
        <button class="btn-primary" onclick="doLogin()">LOGIN</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Master Admin Dashboard</h2>
            <div>
                <button class="btn-info" onclick="uploadToCloud()">⬆️ Upload to Cloud</button>
                <button class="btn-success" onclick="downloadFromCloud()">⬇️ Download from Cloud</button>
                <button class="btn-danger" onclick="doLogout()">Logout</button>
            </div>
        </div>

        <div class="tabs">
            <button id="tab0" class="active" onclick="showTab(0)">Dashboard</button>
            <button id="tab1" onclick="showTab(1)">Companies</button>
            <button id="tab2" onclick="showTab(2)">Merchandisers</button>
            <button id="tab3" onclick="showTab(3)">Stores</button>
            <button id="tab4" onclick="showTab(4)">Audit Logs</button>
        </div>

        <!-- TAB 0: Dashboard -->
        <div id="content0" class="tab-content active">
            <div id="stats" style="display: flex; gap: 20px; margin-bottom: 20px;"></div>
            <div style="background: #e0e0e0; padding: 20px; border-radius: 10px;">
                <h3>Quick Actions</h3>
                <button class="btn-primary" onclick="showAddCompany()">Add Company</button>
                <button class="btn-primary" onclick="showAddMerchandiser()">Add Merchandiser</button>
                <button class="btn-primary" onclick="showAddStore()">Add Store</button>
            </div>
        </div>

        <!-- TAB 1: Companies -->
        <div id="content1" class="tab-content">
            <button class="btn-primary" onclick="showAddCompany()">Add Company</button>
            <div id="companiesList"></div>
        </div>

        <!-- TAB 2: Merchandisers -->
        <div id="content2" class="tab-content">
            <button class="btn-primary" onclick="showAddMerchandiser()">Add Merchandiser</button>
            <div id="merchandisersList"></div>
        </div>

        <!-- TAB 3: Stores -->
        <div id="content3" class="tab-content">
            <button class="btn-primary" onclick="showAddStore()">Add Store</button>
            <div id="storesList"></div>
        </div>

        <!-- TAB 4: Audit Logs -->
        <div id="content4" class="tab-content">
            <button class="btn-danger" onclick="clearLogs()">Clear Logs</button>
            <div id="auditLogsList"></div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="companyModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;"><div style="background:white; padding:30px; border-radius:10px; width:400px; margin:100px auto;"><h3>Add Company</h3><input type="text" id="companyName" placeholder="Company Name"><input type="text" id="companyCode" placeholder="Company Code"><button onclick="addCompany()">Add</button><button onclick="closeModal('companyModal')">Cancel</button></div></div>
    <div id="merchModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;"><div style="background:white; padding:30px; border-radius:10px; width:400px; margin:100px auto;"><h3>Add Merchandiser</h3><select id="merchCompanyId"></select><input type="text" id="merchName" placeholder="Full Name"><input type="text" id="merchCode" placeholder="Employee Code"><input type="text" id="merchPassword" placeholder="Password" value="MERCH2024"><button onclick="addMerchandiser()">Add</button><button onclick="closeModal('merchModal')">Cancel</button></div></div>
    <div id="storeModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;"><div style="background:white; padding:30px; border-radius:10px; width:400px; margin:100px auto;"><h3>Add Store</h3><select id="storeCompanyId"></select><select id="storeAssignedTo"></select><input type="text" id="storeName" placeholder="Store Name"><input type="text" id="storeLat" placeholder="Latitude"><input type="text" id="storeLng" placeholder="Longitude"><input type="text" id="storeRadius" placeholder="Radius (meters)" value="20"><button onclick="addStore()">Add</button><button onclick="closeModal('storeModal')">Cancel</button></div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://rrarpqheozekqzhlwhcw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyYXJwcWhlb3pla3F6bGh3aGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTU1MjIsImV4cCI6MjA5Njc5MTUyMn0.PdsrB2el9J2qyrYzUoBfpWruRKF9YXcI7koON0Gdzkk';
        
        let supabase;
        let companies = [], merchandisers = [], stores = [], auditLogs = [];

        function doLogin() {
            const pwd = document.getElementById('password').value;
            if (pwd === 'MASTER2024') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
                initSupabase();
                addLog('Login', 'Master Admin logged in');
                refreshAll();
            } else {
                alert('Wrong password! Use: MASTER2024');
            }
        }

        function doLogout() {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            addLog('Logout', 'Master Admin logged out');
        }

        async function initSupabase() {
            supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await downloadFromCloud();
        }

        async function uploadToCloud() {
            alert('Uploading to cloud...');
            try {
                for (const c of companies) await supabase.from('companies').upsert(c);
                for (const m of merchandisers) await supabase.from('merchandisers').upsert(m);
                for (const s of stores) await supabase.from('stores').upsert(s);
                alert('✅ Uploaded successfully!');
                addLog('Cloud Sync', 'Data uploaded to cloud');
            } catch(e) { alert('❌ Upload failed: ' + e.message); }
        }

        async function downloadFromCloud() {
            alert('Downloading from cloud...');
            try {
                const { data: cd } = await supabase.from('companies').select('*');
                const { data: md } = await supabase.from('merchandisers').select('*');
                const { data: sd } = await supabase.from('stores').select('*');
                if (cd && cd.length) companies = cd;
                if (md && md.length) merchandisers = md;
                if (sd && sd.length) stores = sd;
                saveData();
                refreshAll();
                alert('✅ Downloaded successfully!');
                addLog('Cloud Sync', 'Data downloaded from cloud');
            } catch(e) { alert('❌ Download failed: ' + e.message); }
        }

        function loadData() {
            companies = JSON.parse(localStorage.getItem('companies') || '[]');
            merchandisers = JSON.parse(localStorage.getItem('merchandisers') || '[]');
            stores = JSON.parse(localStorage.getItem('stores') || '[]');
            auditLogs = JSON.parse(localStorage.getItem('auditLogs') || '[]');
            refreshAll();
        }

        function saveData() {
            localStorage.setItem('companies', JSON.stringify(companies));
            localStorage.setItem('merchandisers', JSON.stringify(merchandisers));
            localStorage.setItem('stores', JSON.stringify(stores));
            localStorage.setItem('auditLogs', JSON.stringify(auditLogs));
        }

        function addLog(action, details) {
            auditLogs.unshift({ id: Date.now(), action: action, details: details, time: new Date().toLocaleString() });
            if (auditLogs.length > 50) auditLogs.pop();
            saveData();
            refreshAuditLogs();
        }

        function refreshAll() {
            document.getElementById('stats').innerHTML = '<div style="background:white; padding:20px; border-radius:10px; text-align:center;"><h3>' + companies.length + '</h3><p>Companies</p></div><div style="background:white; padding:20px; border-radius:10px; text-align:center;"><h3>' + merchandisers.length + '</h3><p>Merchandisers</p></div><div style="background:white; padding:20px; border-radius:10px; text-align:center;"><h3>' + stores.length + '</h3><p>Stores</p></div>';
            refreshCompanies();
            refreshMerchandisers();
            refreshStores();
            refreshAuditLogs();
        }

        function refreshCompanies() {
            let html = '';
            companies.forEach(c => { html += '<div class="company"><div><strong>' + c.name + '</strong><br>Code: ' + c.code + '</div><button class="btn-danger" onclick="deleteCompany(\'' + c.id + '\')">Delete</button></div>'; });
            document.getElementById('companiesList').innerHTML = html || '<p>No companies</p>';
        }

        function refreshMerchandisers() {
            let html = '';
            merchandisers.forEach(m => {
                const company = companies.find(c => c.id === m.companyId);
                html += '<div class="merch"><div><strong>' + m.name + '</strong><br>' + (company ? company.name : 'Unknown') + ' | Code: ' + m.employeeCode + '<br>Password: ' + m.password + '</div><div><button class="btn-info" onclick="exportStores(\'' + m.id + '\', \'' + m.name + '\')">Export</button><button class="btn-danger" onclick="deleteMerchandiser(\'' + m.id + '\')">Delete</button></div></div>';
            });
            document.getElementById('merchandisersList').innerHTML = html || '<p>No merchandisers</p>';
        }

        function refreshStores() {
            let html = '';
            stores.forEach(s => {
                const company = companies.find(c => c.id === s.companyId);
                const merch = merchandisers.find(m => m.id === s.assignedTo);
                html += '<div class="store"><div><strong>' + s.name + '</strong><br>' + (company ? company.name : 'Unknown') + ' | Assigned: ' + (merch ? merch.name : 'Unassigned') + '<br>📍 ' + s.latitude + ', ' + s.longitude + ' | ' + s.radiusMeters + 'm</div><button class="btn-danger" onclick="deleteStore(\'' + s.id + '\')">Delete</button></div>';
            });
            document.getElementById('storesList').innerHTML = html || '<p>No stores</p>';
        }

        function refreshAuditLogs() {
            let html = '';
            auditLogs.slice(0, 30).forEach(log => { html += '<div class="company"><div><strong>' + log.action + '</strong><br>' + log.details + ' - ' + log.time + '</div></div>'; });
            document.getElementById('auditLogsList').innerHTML = html || '<p>No logs</p>';
        }

        function exportStores(merchId, merchName) {
            const storesForMerch = stores.filter(s => s.assignedTo === merchId);
            if (storesForMerch.length === 0) { alert('No stores assigned'); return; }
            const jsonData = { merchandiser_id: merchId, merchandiser_name: merchName, stores: storesForMerch };
            navigator.clipboard.writeText(JSON.stringify(jsonData));
            alert('JSON copied! Send to merchandiser via WhatsApp.');
        }

        function showAddCompany() { document.getElementById('companyModal').style.display = 'flex'; }
        function addCompany() {
            const name = document.getElementById('companyName').value, code = document.getElementById('companyCode').value;
            if (name && code) {
                companies.push({ id: Date.now().toString(), name: name, code: code.toUpperCase() });
                saveData(); refreshAll(); closeModal('companyModal');
                addLog('Add Company', 'Added: ' + name);
                document.getElementById('companyName').value = ''; document.getElementById('companyCode').value = '';
            }
        }
        function deleteCompany(id) {
            if (confirm('Delete this company? All merchandisers and stores will be deleted too.')) {
                companies = companies.filter(c => c.id !== id);
                merchandisers = merchandisers.filter(m => m.companyId !== id);
                stores = stores.filter(s => s.companyId !== id);
                saveData(); refreshAll();
                addLog('Delete Company', 'Deleted');
            }
        }

        function showAddMerchandiser() {
            const select = document.getElementById('merchCompanyId');
            select.innerHTML = '';
            companies.forEach(c => { select.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
            document.getElementById('merchModal').style.display = 'flex';
        }
        function addMerchandiser() {
            const companyId = document.getElementById('merchCompanyId').value, name = document.getElementById('merchName').value, code = document.getElementById('merchCode').value, pass = document.getElementById('merchPassword').value;
            if (name && code && companyId) {
                merchandisers.push({ id: Date.now().toString(), name: name, companyId: companyId, employeeCode: code.toUpperCase(), password: pass });
                saveData(); refreshAll(); closeModal('merchModal');
                addLog('Add Merchandiser', 'Added: ' + name);
                document.getElementById('merchName').value = ''; document.getElementById('merchCode').value = '';
            }
        }
        function deleteMerchandiser(id) {
            if (confirm('Delete this merchandiser?')) {
                merchandisers = merchandisers.filter(m => m.id !== id);
                stores = stores.filter(s => s.assignedTo !== id);
                saveData(); refreshAll();
                addLog('Delete Merchandiser', 'Deleted');
            }
        }

        function showAddStore() {
            const companySelect = document.getElementById('storeCompanyId');
            companySelect.innerHTML = '';
            companies.forEach(c => { companySelect.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
            refreshStoreAssignedTo();
            document.getElementById('storeModal').style.display = 'flex';
        }
        function refreshStoreAssignedTo() {
            const companyId = document.getElementById('storeCompanyId').value;
            const assignedSelect = document.getElementById('storeAssignedTo');
            assignedSelect.innerHTML = '<option value="">Unassigned</option>';
            merchandisers.filter(m => m.companyId === companyId).forEach(m => { assignedSelect.innerHTML += '<option value="' + m.id + '">' + m.name + '</option>'; });
        }
        function addStore() {
            const companyId = document.getElementById('storeCompanyId').value, assignedTo = document.getElementById('storeAssignedTo').value || null, name = document.getElementById('storeName').value, lat = parseFloat(document.getElementById('storeLat').value), lng = parseFloat(document.getElementById('storeLng').value), rad = parseInt(document.getElementById('storeRadius').value);
            if (name && !isNaN(lat) && !isNaN(lng) && companyId) {
                stores.push({ id: Date.now().toString(), name: name, latitude: lat, longitude: lng, radiusMeters: rad, companyId: companyId, assignedTo: assignedTo });
                saveData(); refreshAll(); closeModal('storeModal');
                addLog('Add Store', 'Added: ' + name);
                document.getElementById('storeName').value = ''; document.getElementById('storeLat').value = ''; document.getElementById('storeLng').value = '';
            }
        }
        function deleteStore(id) {
            if (confirm('Delete this store?')) {
                stores = stores.filter(s => s.id !== id);
                saveData(); refreshAll();
                addLog('Delete Store', 'Deleted');
            }
        }

        function clearLogs() {
            if (confirm('Clear all audit logs?')) {
                auditLogs = [];
                saveData();
                refreshAuditLogs();
                addLog('Clear Logs', 'All audit logs cleared');
            }
        }

        function showTab(index) {
            for (let i = 0; i <= 4; i++) {
                document.getElementById('content' + i).classList.remove('active');
                document.getElementById('tab' + i).classList.remove('active');
            }
            document.getElementById('content' + index).classList.add('active');
            document.getElementById('tab' + index).classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('storeCompanyId')?.addEventListener('change', refreshStoreAssignedTo);
    </script>
</body>
</html>
